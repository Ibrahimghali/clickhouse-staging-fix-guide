---
- name: Heal ClickHouse Split-Brain Replication (Zero Downtime)
  hosts: clickhouse_servers
  gather_facts: false
  vars_files:
    - vars.yml
  tasks:
    - name: Fetch list of broken tables from ch02 (is_readonly = 1)
      shell: >
        docker exec ch02 clickhouse-client --password '{{ ch_password }}'
        -q "SELECT database, table FROM system.replicas WHERE database LIKE 'reporting_shop%' AND is_readonly = 1 FORMAT CSV"
        | tr -d '\"' | tr -d '\r'
      register: broken_tables_output
      changed_when: false

    - name: Display tables slated for metadata recovery
      debug:
        msg: "Found {{ broken_tables_output.stdout_lines | length }} broken tables to fix via Metadata sync."

    - name: Execute Zero-Downtime Fix loop for each broken table
      shell: |
        DB=$(echo "{{ item }}" | cut -d',' -f1)
        TBL=$(echo "{{ item }}" | cut -d',' -f2)

        echo "Starting metadata recovery for $DB.$TBL..."

        # 1. Drop the empty, broken ghost table and orphaned Keeper path on ch01
        docker exec ch01 clickhouse-client --password '{{ ch_password }}' -q "DROP TABLE IF EXISTS $DB.$TBL SYNC;"

        # 2. Rebuild the Keeper path from local data on ch02
        docker exec ch02 clickhouse-client --password '{{ ch_password }}' -q "SYSTEM RESTORE REPLICA $DB.$TBL;"

        # 3. Fetch exact UUID from the healthy node (ch02)
        UUID=$(docker exec ch02 clickhouse-client --password '{{ ch_password }}' -q "SELECT uuid FROM system.tables WHERE database='$DB' AND name='$TBL' FORMAT TabSeparatedRaw")

        # 4. Fetch the exact schema from ch02
        SCHEMA=$(docker exec ch02 clickhouse-client --password '{{ ch_password }}' -q "SHOW CREATE TABLE $DB.$TBL FORMAT TabSeparatedRaw")

        # 5. Inject UUID into the CREATE TABLE statement using sed
        NEW_SCHEMA=$(echo "$SCHEMA" | sed -E "s/CREATE TABLE (\`?$DB\`?\.\`?$TBL\`?)/CREATE TABLE \1 UUID '$UUID'/")

        # 6. Recreate table on ch01 with the forced UUID to join the replication quorum
        docker exec ch01 clickhouse-client --password '{{ ch_password }}' -q "$NEW_SCHEMA"

        echo "Successfully synced $DB.$TBL!"
      loop: "{{ broken_tables_output.stdout_lines }}"
      when: item | trim != ''
      register: fix_results

    - name: Recovery Summary
      debug:
        msg: "Successfully healed {{ fix_results.results | selectattr('changed', 'equalto', true) | list | length }} tables across the cluster!"